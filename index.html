<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>quicksites</title>
  <style>
    :root {
      --paper: #f7f1e6;
      --ink: #211f1b;
      --muted: #6d655a;
      --line: #d8c8b1;
      --card: #fffaf0;
      --dark: #26231e;
      --red: #b94632;
      --shadow: 0 18px 48px rgba(33, 31, 27, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(185, 70, 50, 0.07), transparent 28%),
        linear-gradient(315deg, rgba(18, 125, 117, 0.08), transparent 31%),
        var(--paper);
      color: var(--ink);
      font-family: "Songti SC", "Noto Serif CJK SC", "Source Han Serif SC", ui-serif, Georgia, Cambria, "Times New Roman", serif;
      letter-spacing: 0;
    }

    main {
      width: min(960px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.6rem, 7vw, 5.2rem);
      line-height: 0.96;
      font-weight: 900;
    }

    .lede {
      margin: 0 0 24px;
      max-width: 700px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.55;
    }

    .site-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .site-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.9);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .site-card h2 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      line-height: 1.15;
    }

    .site-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border: 1px solid var(--dark);
      border-radius: 6px;
      background: var(--dark);
      color: #fffaf0;
      padding: 9px 13px;
      font-family: "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, sans-serif;
      text-decoration: none;
      white-space: nowrap;
    }

    .meta {
      margin-top: 24px;
      color: var(--muted);
      font-family: "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, sans-serif;
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .site-card {
        grid-template-columns: 1fr;
      }

      .open-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>quicksites</h1>
    <p class="lede">这是一些临时但可公开访问的小网页。根目录只做索引，具体页面使用独立路径，方便之后继续添加更多站点。</p>

    <ul class="site-list">
      <li class="site-card">
        <div>
          <h2>USYD rental shortlist</h2>
          <p>2B2B + gym 租房候选、图片列表、USYD 和轨道交通地图。</p>
        </div>
        <a class="open-link" href="usyd-rental-shortlist.html">打开页面</a>
      </li>
    </ul>

    <p class="meta">Published with GitHub Pages.</p>
  </main>
</body>
</html>
